
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Login | SmartAttend</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <div class="auth-container">

        <!-- Left Side -->
        <div class="auth-info">

            <div class="logo">
                📚 SmartAttend
            </div>

            <h1>
                Welcome Back! 👋
            </h1>

            <p>
                Login to access your attendance dashboard,
                notifications, and academic information.
            </p>

        </div>


        <!-- Login Card -->
        <div class="auth-card">

            <a href="index.html" class="back-link">
                ← Back to Home
            </a>

            <h2>Student Login</h2>

            <p class="auth-subtitle">
                Login to continue to your account
            </p>


            <form id="studentLoginForm">

                <!-- Email -->
                <div class="form-group">

                    <label for="loginEmail">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Enter your email"
                        required
                    >

                </div>


                <!-- Password -->
                <div class="form-group">

                    <label for="loginPassword">
                        Password
                    </label>

                    <div class="password-wrapper">

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Enter your password"
                            required
                        >

                        <button
                            type="button"
                            onclick="togglePassword('loginPassword')"
                            class="show-password"
                        >
                            👁️
                        </button>

                    </div>

                </div>


                <div class="form-options">

                    <label class="remember-me">

                        <input type="checkbox">

                        Remember me

                    </label>

                    <a href="#" class="forgot-link">
                        Forgot Password?
                    </a>

                </div>


                <button
                    type="submit"
                    class="auth-btn"
                >
                    Login
                </button>

            </form>


            <p class="switch-auth">

                Don't have an account?

                <a href="student-register.html">
                    Create Account
                </a>

            </p>

        </div>

    </div>


    <script type="module" src="script.js"></script>

</body>

</html>
