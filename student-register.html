
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Student Registration | SmartAttend</title>

    <link rel="stylesheet" href="style.css">

</head>


<body class="auth-page">


    <div class="auth-container">


        <!-- Left Side -->

        <div class="auth-info">

            <div class="logo">
                📚 SmartAttend
            </div>

            <h1>
                Create Your Account 🎓
            </h1>

            <p>
                Join SmartAttend and easily manage your
                attendance and academic information.
            </p>

        </div>


        <!-- Registration Card -->

        <div class="auth-card">

            <a
                href="index.html"
                class="back-link"
            >
                ← Back to Home
            </a>


            <h2>
                Student Registration
            </h2>

            <p class="auth-subtitle">
                Create your SmartAttend account
            </p>


            <form id="studentRegisterForm">


                <!-- Full Name -->

                <div class="form-group">

                    <label for="studentName">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="studentName"
                        placeholder="Enter your full name"
                        required
                    >

                </div>


                <!-- Roll Number -->

                <div class="form-group">

                    <label for="rollNumber">
                        Roll Number
                    </label>

                    <input
                        type="text"
                        id="rollNumber"
                        placeholder="Enter your roll number"
                        required
                    >

                </div>


                <!-- Email -->

                <div class="form-group">

                    <label for="registerEmail">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="registerEmail"
                        placeholder="Enter your email"
                        required
                    >

                </div>


                <!-- Course -->

                <div class="form-group">

                    <label for="course">
                        Course / Branch
                    </label>

                    <select id="course" required>

                        <option value="">
                            Select your course
                        </option>

                        <option value="CSE">
                            Computer Science & Engineering
                        </option>

                        <option value="IT">
                            Information Technology
                        </option>

                        <option value="ECE">
                            Electronics & Communication
                        </option>

                        <option value="Other">
                            Other
                        </option>

                    </select>

                </div>


                <!-- Password -->

                <div class="form-group">

                    <label for="registerPassword">
                        Password
                    </label>

                    <div class="password-wrapper">

                        <input
                            type="password"
                            id="registerPassword"
                            placeholder="Create a password"
                            required
                        >

                        <button
                            type="button"
                            onclick="togglePassword('registerPassword')"
                            class="show-password"
                        >
                            👁️
                        </button>

                    </div>

                </div>


                <!-- Confirm Password -->

                <div class="form-group">

                    <label for="confirmPassword">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm your password"
                        required
                    >

                </div>


                <button
                    type="submit"
                    class="auth-btn"
                >
                    Create Account
                </button>


            </form>


            <p class="switch-auth">

                Already have an account?

                <a href="student-login.html">
                    Login
                </a>

            </p>


        </div>

    </div>


    <script type="module" src="script.js"></script>

</body>

</html>
